<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>  <img src="\assets\icon\Theday5.jpg"/></ion-title>
  </ion-toolbar>
</ion-header>
 
<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">register</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="lr">
  <h2 class="title">Login/Register</h2>
  <input type="text" placeholder="Email" #email/>
  <br>
<input type="password" placeholder="Password" #pass/>
<br>
<p *ngIf="error !== ''">{{error}}</p>
<ion-button (click)="register(email.value, pass.value)">Register</ion-button>
<br>
   <p>    Already have an account with us?</p>
   <br>
   <ion-button class="buttonreg" fill="view" routerLink="/tabs/tab5">login your account here</ion-button>
  </div>
</ion-content>
